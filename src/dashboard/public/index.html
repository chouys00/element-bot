<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>element-bot 監控台</title>
<style>
  :root { color-scheme: dark; }
  * { scrollbar-width: thin; scrollbar-color: #2a2d36 transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2d36; border-radius: 6px; }
  *:hover::-webkit-scrollbar-thumb { background: #565d6b; }
  html, body { height: 100%; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
  body { font-family: system-ui, "Microsoft JhengHei", sans-serif; background: #16181d; color: #e6e6e6; font-size: 14px; }
  header { flex-shrink: 0; padding: 10px 16px; background: #1c1f26; border-bottom: 1px solid #2c2f38; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  header .dot { font-weight: bold; }
  header .counts { display: flex; gap: 7px; flex-wrap: wrap; }
  header .counts span { color: #c8ced8; background: #252932; border: 1px solid #343a45; border-radius: 999px; padding: 3px 9px; white-space: nowrap; }
  header .counts .warn { border-color: #6e5a2d; color: #e6c36a; }
  header .counts .bad { border-color: #713b43; color: #ff9d96; }
  main { flex: 1; overflow: hidden; padding: 16px; display: flex; flex-direction: column; gap: 14px; box-sizing: border-box; }
  .dev { flex-shrink: 0; border: 1px dashed #555; border-radius: 8px; padding: 10px; }
  .dev summary { cursor: pointer; color: #bbb; }
  .dev table { max-height: 160px; display: block; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #2a2d36; vertical-align: top; }
  th { color: #9aa; font-weight: 600; }
  .split { flex: 1; display: flex; gap: 14px; overflow: hidden; }
  .tasks { flex: 1.5; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .tasks table { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .tasks thead, .tasks tbody, .tasks tr { display: block; width: 100%; }
  .tasks thead { flex-shrink: 0; }
  .tasks tbody { overflow-y: auto; flex: 1; min-height: 0; }
  .tasks tr { display: grid; grid-template-columns: var(--rz-cols, 84px 15% 16% 1fr 112px); }
  .tasks th, .tasks td { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .tasks tr > *:last-child { text-align: center; } /* 狀態欄置中 */
  .rz-handle { position: absolute; top: 0; right: 0; width: 8px; height: 100%; cursor: col-resize; z-index: 2; user-select: none; }
  .rz-handle::after { content: ""; position: absolute; top: 4px; bottom: 4px; right: 3px; width: 2px; border-radius: 1px; background: transparent; }
  .rz-handle:hover::after, .rz-handle:active::after { background: #58a6ff; }
  .detail { flex: 1; border-left: 1px solid #2a2d36; padding-left: 14px; min-width: 240px; overflow-y: auto; }
  tr.task { cursor: pointer; }
  tr.task:hover { background: #1f232b; }
  tr.task.sel { background: #283041; }
  .badge { padding: 1px 8px; border-radius: 10px; color: #fff; font-size: 12px; }
  .pending { background: #9ca3af; } .processing { background: #3b82f6; } .review { background: #f59e0b; } .done { background: #22c55e; } .failed { background: #ef4444; } .blocked { background: #b45309; }
  .publishing { background: #2563eb; } .publish_failed { background: #be123c; } .publish_unknown { background: #7c3aed; } .published { background: #15803d; }
  .closed { background: #475569; }
  .judging { background: #8b5cf6; } .rejected { background: #4b5563; } .judge_error { background: #b45309; }
  pre { background: #0f1115; padding: 8px; border-radius: 6px; white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow: auto; }
  .muted { color: #777; }
  .k { color: #889; display: inline-block; min-width: 64px; }
  .abtn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  .abtn:hover { border-color: #58a6ff; color: #79b8ff; }
</style>
</head>
<body>
<header>
  <span class="dot" id="botStatus">…</span>
  <span class="muted">Matrix：<span id="matrixAccount" style="font-family:monospace">—</span></span>
  <span class="counts" id="counts"></span>
  <span class="muted" style="margin-left:auto">操作者：<span id="approverDisplay" style="font-family:monospace">尚未設定</span></span>
  <button id="changeApprover" class="abtn" type="button">設定</button>
  <button id="roomsBtn" class="abtn">🏠 監聽房間</button>
  <button id="notifyBtn" class="abtn">🔔 通知設定</button>
  <a href="/rules.html" class="abtn" style="text-decoration:none">⚙ 規則設定</a>
</header>
<main>
  <div class="split">
    <div class="tasks">
      <b>📋 觸發的任務</b>
      <table id="tasksTable">
        <thead><tr><th>時間</th><th>聊天室</th><th>發送者</th><th>規則 → 任務</th><th>狀態</th></tr></thead>
        <tbody id="tasks"></tbody>
      </table>
    </div>
    <div class="detail">
      <b>🔎 任務詳情</b>
      <div id="detail" class="muted">點選左側任務以檢視詳情與日誌。</div>
    </div>
  </div>

  <details class="dev">
    <summary>🔧 監聽訊息（開發用,之後移除）</summary>
    <table><tbody id="msgs"></tbody></table>
  </details>
</main>

<!-- 通知設定小面板(彈窗) -->
<div id="notifyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10;align-items:center;justify-content:center">
  <div style="background:#1c1f26;border:1px solid #2c2f38;border-radius:10px;padding:18px 20px;min-width:340px;max-width:90vw">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <b style="flex:1">🔔 任務通知設定</b>
      <button id="notifyClose" class="abtn">✕</button>
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer">
      <input type="checkbox" id="nf_enabled" /> 啟用任務通知
    </label>
    <div style="margin-bottom:12px">
      <div class="k" style="min-width:0;margin-bottom:4px">通知房間 room_id</div>
      <input type="text" id="nf_room" placeholder="!xxxxxxxx:ims.opscloud.info" style="width:100%;box-sizing:border-box;background:#0f1115;color:#e6e6e6;border:1px solid #30363d;border-radius:6px;padding:6px;font-family:monospace" />
      <div class="muted" style="font-size:12px;margin-top:4px">手動填入房間 room_id;bot 登入帳號必須已加入此房間,否則發送失敗。</div>
    </div>
    <div style="margin-bottom:14px">
      <div class="k" style="min-width:0;margin-bottom:4px">通知時機</div>
      <select id="nf_on" style="width:100%;background:#0f1115;color:#e6e6e6;border:1px solid #30363d;border-radius:6px;padding:6px">
        <option value="all">全部（成功與失敗都通知）</option>
        <option value="failed_only">只在失敗時通知</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;align-items:center">
      <span id="nf_msg" class="muted" style="flex:1;font-size:12px"></span>
      <button id="nf_save" class="abtn">儲存</button>
    </div>
  </div>
</div>

<!-- 監聽房間設定小面板(彈窗) -->
<div id="roomsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10;align-items:center;justify-content:center">
  <div style="background:#1c1f26;border:1px solid #2c2f38;border-radius:10px;padding:18px 20px;min-width:420px;max-width:90vw">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <b style="flex:1">🏠 監聽房間</b>
      <button id="roomsClose" class="abtn">✕</button>
    </div>
    <div class="muted" style="font-size:12px;margin-bottom:8px">一行一個 room_id。這是 bot 監聽的權威清單,規則只能從中挑房間。存檔後 bot 自動熱載入,免重啟。</div>
    <textarea id="rc_text" spellcheck="false" style="width:100%;box-sizing:border-box;height:140px;background:#0f1115;color:#e6e6e6;border:1px solid #30363d;border-radius:6px;padding:8px;font-family:monospace;font-size:13px;resize:vertical"></textarea>
    <div id="rc_preview" style="margin-top:8px;font-size:12px;max-height:140px;overflow:auto"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;align-items:center;margin-top:12px">
      <span id="rc_msg" class="muted" style="flex:1;font-size:12px"></span>
      <button id="rc_save" class="abtn">儲存</button>
    </div>
  </div>
</div>

<script src="/resizable.js"></script>
<script>
const STATUS_LABEL = { pending: "待處理", processing: "進行中", review: "待驗收", publishing: "提交中", publish_failed: "發布失敗", publish_unknown: "發布結果未知", published: "已發布", done: "完成", failed: "失敗", blocked: "受阻", closed: "已關閉", judging: "LLM 判斷中", rejected: "LLM 不觸發", judge_error: "LLM 判斷失敗" };
const APPROVER_KEY = "element-bot.approved-by";
const COMPANY_ID_PATTERN = /^[A-Za-z]+\.[A-Za-z]+$/;
const approverDisplay = document.getElementById("approverDisplay");
const changeApprover = document.getElementById("changeApprover");
let savedApprover = "";
try { savedApprover = (localStorage.getItem(APPROVER_KEY) || "").trim(); } catch (_) {}
if (!COMPANY_ID_PATTERN.test(savedApprover)) {
  savedApprover = "";
  try { localStorage.removeItem(APPROVER_KEY); } catch (_) {}
}

function renderApprover() {
  approverDisplay.textContent = savedApprover || "尚未設定";
  changeApprover.textContent = savedApprover ? "更換" : "設定";
}

function promptForApprover() {
  const entered = prompt("請輸入公司 ID（例如 patrick.zyx）", savedApprover);
  if (entered === null) return null;
  const companyId = entered.trim();
  if (!COMPANY_ID_PATTERN.test(companyId)) {
    alert("公司 ID 格式不正確，請輸入例如 patrick.zyx");
    return null;
  }
  savedApprover = companyId;
  try { localStorage.setItem(APPROVER_KEY, savedApprover); } catch (_) {}
  renderApprover();
  return savedApprover;
}

changeApprover.addEventListener("click", promptForApprover);
renderApprover();
let selectedId = null;
let lastTasks = [];
// 詳情面板上次渲染的任務與 HTML,用來判斷這次輪詢要不要真的重建 DOM。
// 每 1.5s 輪詢會重跑 renderDetail;若無腦重設 innerHTML,.detail 容器的 scrollTop 會歸零,
// 使用者往下捲看「執行輸出」時畫面會一直跳回頂部。內容沒變就完全不動 DOM 即可避免。
let lastDetailKey = null;
let lastDetailHtml = null;

// 顯示用狀態:done 但尚未驗收 → 待驗收(review);已驗收 → 完成(done)。
// judging = LLM 判斷進行中;judged = 已判完但沒觸發(拒絕或判斷失敗)。
function underlyingStatus(t) {
  if (t.status === "done") {
    if (t.approval && ["pending", "processing"].includes(t.approval.status)) return "publishing";
    if (t.approval && t.approval.status === "failed") return "publish_failed";
    if (t.approval && t.approval.status === "unknown") return "publish_unknown";
    if (t.approval && t.approval.status === "done") return "published";
    return t.verified ? "done" : "review";
  }
  if (t.status === "judged") return t.judge && t.judge.status === "error" ? "judge_error" : "rejected";
  return t.status;
}
function displayStatus(t) { return t.closure ? "closed" : underlyingStatus(t); }

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function timeOf(t) { return t ? new Date(t).toLocaleTimeString("zh-Hant", { hour12: false }) : "—"; }
// 列表顯示：今天顯示「今天 HH:MM」，跨日補 MM/DD HH:MM
function timeLabel(ts) {
  if (!ts) return "—";
  const d = new Date(ts), now = new Date();
  const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
  const hhmm = d.toLocaleTimeString("zh-Hant", { hour12: false, hour: "2-digit", minute: "2-digit" });
  if (sameDay) return "今天 " + hhmm;
  return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${hhmm}`;
}
// 完整時間：YYYY/MM/DD HH:MM:SS，用於 title hover 與詳情面板
function timeFull(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${d.toLocaleTimeString("zh-Hant", { hour12: false })}`;
}
function badge(s) { return `<span class="badge ${s}">${STATUS_LABEL[s] || s}</span>`; }

async function refresh() {
  try {
    const [status, tasks, msgs] = await Promise.all([
      fetch("/api/status").then((r) => r.json()),
      fetch("/api/tasks").then((r) => r.json()),
      fetch("/api/messages").then((r) => r.json()),
    ]);
    renderStatus(status);
    renderTasks(tasks);
    renderMsgs(msgs);
  } catch (e) {
    document.getElementById("botStatus").textContent = "🔴 儀表板無法連線";
  }
}

function renderStatus(s) {
  document.getElementById("botStatus").textContent = s.bot_online ? "🟢 bot 連線中" : "🔴 bot 離線";
  document.getElementById("matrixAccount").textContent = s.matrix_account_name || "未設定";
  const c = s.counts || {};
  const active = (c.judging || 0) + (c.pending || 0) + (c.processing || 0) + (c.publishing || 0);
  const review = c.review || 0;
  const issues = (c.blocked || 0) + (c.failed || 0) + (c.publish_failed || 0) + (c.publish_unknown || 0);
  document.getElementById("counts").innerHTML =
    `<span>執行中 ${active}</span><span class="warn">待驗收 ${review}</span><span class="bad">異常 ${issues}</span>`;
}

function renderMsgs(msgs) {
  document.getElementById("msgs").innerHTML = (msgs || []).map((m) =>
    `<tr><td class="muted">${timeOf(m.origin_server_ts)}</td><td>${esc(m.room_name || m.room_id)}</td><td>${esc(m.sender)}</td><td>${esc(m.body)}</td></tr>`
  ).join("") || `<tr><td class="muted">（尚無訊息）</td></tr>`;
}

// skill-dispatch 是通用「計程車」任務,task 欄本身固定不變,對分辨「這則任務送去哪」沒有資訊量。
// 改顯示 project_path 的最後一段目錄名(如 D:\GB\PC\ftl\ftl → ftl)。
function taskLabel(t) {
  if (t.task === "skill-dispatch" && t.project_path) {
    const seg = String(t.project_path).replace(/[\\/]+$/, "").split(/[\\/]/);
    return seg[seg.length - 1] || t.task;
  }
  return t.task;
}

function renderTasks(tasks) {
  lastTasks = tasks || [];
  document.getElementById("tasks").innerHTML = lastTasks.map((t) => {
    if (t.parseError) return `<tr class="task" data-id="${esc(t.id)}"><td style="grid-column:span 4" class="failed">⚠ 任務檔解析失敗:${esc(t.id)}</td><td>${badge(t.status)}</td></tr>`;
    const ruleTask = `${t.rule} → ${taskLabel(t)}`;
    // title:skill-dispatch 顯示的是專案名而非任務型態,hover 補上真實 task 名 + 完整專案路徑,不用點進詳情才看得到。
    const ruleTaskTitle = t.task === "skill-dispatch" && t.project_path
      ? `任務類型:${t.task}\n專案路徑:${t.project_path}`
      : ruleTask;
    return `<tr class="task ${t.id === selectedId ? "sel" : ""}" data-id="${esc(t.id)}">
      <td class="muted" title="${esc(timeFull(t.enqueued_at))}">${timeLabel(t.enqueued_at)}</td>
      <td title="${esc(t.room_name)}">${esc(t.room_name)}</td>
      <td title="${esc(t.sender)}">${esc(t.sender)}</td>
      <td title="${esc(ruleTaskTitle)}">${esc(ruleTask)}</td>
      <td>${badge(displayStatus(t))}</td></tr>`;
  }).join("") || `<tr><td style="grid-column:span 5" class="muted">（尚無觸發的任務）</td></tr>`;

  document.querySelectorAll("tr.task").forEach((tr) => tr.addEventListener("click", () => selectTask(tr.dataset.id)));
  if (selectedId) renderDetail();
}

async function selectTask(id) {
  selectedId = id;
  document.querySelectorAll("tr.task").forEach((tr) => tr.classList.toggle("sel", tr.dataset.id === id));
  renderDetail();
}

function stepIcon(s) { return s === "ok" ? "✓" : s === "run" ? "⏳" : s === "error" ? "✗" : s === "stop" ? "⚠" : "○"; }
function stepColor(s) { return s === "ok" ? "#7ee787" : s === "run" ? "#58a6ff" : (s === "error" || s === "stop") ? "#ff9d96" : "#586069"; }

async function renderDetail() {
  const t = lastTasks.find((x) => x.id === selectedId);
  const box = document.getElementById("detail");
  if (!t) { box.innerHTML = `<span class="muted">任務已不在列表中。</span>`; lastDetailKey = null; lastDetailHtml = null; return; }
  let prog = { steps: [], summary: null };
  try { prog = await fetch(`/api/tasks/${encodeURIComponent(selectedId)}/progress`).then((r) => r.json()); } catch (_) {}

  const stepsHtml = prog.steps.length
    ? `<div class="k" style="margin-top:8px">步驟</div>` + prog.steps.map((s) =>
        `<div style="color:${stepColor(s.status)}">${stepIcon(s.status)} ${esc(s.label)}` +
        (s.ms != null ? ` <span class="muted">${(s.ms / 1000).toFixed(1)}s</span>` : (s.note ? ` <span class="muted">${esc(s.note)}</span>` : "")) +
        `</div>`).join("")
    : "";

  const sum = prog.summary;
  // ai_run 會記錄完整輸出；summary.output 供舊 checkpoint 續跑時補足顯示。
  const codexOutput = prog.aiOutput || (sum && sum.output) || "";
  const aiHtml = codexOutput
    ? `<div class="k" style="margin-top:8px">執行輸出 (Codex)</div><pre>${esc(codexOutput)}</pre>`
    : "";
  const linksHtml = Array.isArray(prog.links) && prog.links.length
    ? `<div class="k" style="margin-top:8px">驗收連結</div>` + prog.links.map((url) =>
        `<div><a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a></div>`
      ).join("")
    : "";

  // LLM 判斷紀錄(judging/judged):判斷中/不觸發/失敗與失敗原因。
  let judgeHtml = "";
  if (t.status === "judging") {
    judgeHtml = `<div class="k" style="margin-top:8px">LLM 判斷</div><div style="color:#a78bfa">⏳ 判斷中…(結果出來前不會入列)</div>`;
  } else if (t.status === "judged" && t.judge) {
    judgeHtml = `<div class="k" style="margin-top:8px">LLM 判斷</div>` +
      (t.judge.status === "error"
        ? `<div style="color:#ff9d96">✗ 判斷失敗:${esc(t.judge.detail || "(無錯誤訊息)")}</div>`
        : `<div class="muted">✗ LLM 判定不觸發(關鍵字有命中,但內容不符觸發意圖)</div>`);
  }

  // skill-dispatch:清單只顯示得到專案名,詳情頁把完整專案路徑 + 實際送出的指令列出來,
  // 才看得到當初這則任務具體是「送去哪、送了什麼」。
  const dispatchHtml = t.task === "skill-dispatch" && t.project_path
    ? `<div><span class="k">專案路徑</span> <code>${esc(t.project_path)}</code></div>` +
      (t.target_branch ? `<div><span class="k">目標分支</span> <code>${esc(t.target_branch)}</code></div>` : "") +
      (t.command ? `<div><span class="k">送出指令</span> <code>${esc(t.command)}</code></div>` : "")
    : "";

  const approvalHtml = t.approval
    ? `<div><span class="k">驗收人</span> ${esc(t.approval.approved_by || "—")}</div>` +
      `<div><span class="k">驗收時間</span> ${timeFull(t.approval.approved_at)}</div>` +
      `<div><span class="k">發布狀態</span> ${badge(underlyingStatus(t))}</div>` +
      `<div><span class="k">發布嘗試</span> ${esc(t.approval.attempt == null ? 0 : t.approval.attempt)}</div>` +
      (t.approval.last_error ? `<div><span class="k">發布診斷</span> <span class="failed">${esc(t.approval.last_error)}</span></div>` : "") +
      (t.approval.failed_at ? `<div><span class="k">失敗時間</span> ${timeFull(t.approval.failed_at)}</div>` : "") +
      (t.approval.unknown_at ? `<div><span class="k">不確定時間</span> ${timeFull(t.approval.unknown_at)}</div>` : "")
    : "";
  const closureHtml = t.closure
    ? `<div><span class="k">關閉人員</span> ${esc(t.closure.closed_by || "—")}</div>` +
      `<div><span class="k">關閉時間</span> ${timeFull(t.closure.closed_at)}</div>`
    : "";
  const closeable = ["review", "failed", "blocked", "publish_failed", "publish_unknown"].includes(displayStatus(t));
  const actHtml = `<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
    ${!t.closure && t.status === "done" && !t.verified && !t.approval ? `<button data-act="approve" class="abtn">✓ 驗收</button>` : ""}
    ${!t.closure && t.status === "done" && t.verified && !t.approval ? `<span class="muted">✓ 已驗收</span>` : ""}
    ${!t.closure && t.status === "done" && t.approval && !t.approval.malformed && ["failed", "unknown"].includes(t.approval.status) ? `<button data-act="publish-retry" class="abtn">重試發布</button>` : ""}
    ${!t.closure && (t.status === "failed" || t.status === "blocked") ? `<button data-act="requeue" class="abtn">重跑</button>` : ""}
    ${closeable ? `<button data-act="close" class="abtn">設為已關閉</button>` : ""}
    ${t.closure ? `<button data-act="reopen" class="abtn">重新開啟</button>` : ""}
  </div>`;

  const fullHtml = `
    <div><span class="k">狀態</span> ${badge(displayStatus(t))}</div>
    <div><span class="k">任務編號</span> <code>${esc(t.task_number || t.id)}</code></div>
    <div><span class="k">入列時間</span> ${timeFull(t.enqueued_at)}</div>
    <div><span class="k">聊天室</span> ${esc(t.room_name)}</div>
    <div><span class="k">發送者</span> ${esc(t.sender)}</div>
    <div><span class="k">規則</span> ${esc(t.rule)} → ${esc(t.task)}</div>
    ${dispatchHtml}
    ${approvalHtml}
    ${closureHtml}
    <div><span class="k">來源訊息</span> ${esc(t.body)}</div>
    ${judgeHtml}
    ${aiHtml}
    ${linksHtml}
    ${stepsHtml}
    ${actHtml}`;

  // 內容與目前顯示的完全相同(同一任務、HTML 沒變)→ 不動 DOM,保住 scrollTop,畫面不跳頂。
  const sameTask = lastDetailKey === selectedId;
  if (sameTask && fullHtml === lastDetailHtml) return;

  // 同任務但 HTML 有變(任務執行中 meta/步驟每輪更新;輸出本身是原子性一次寫入,不會增量成長)
  // → 記住捲動位置,重建後同步還原,面板不跳頂;切換任務才回到頂部。
  const prevScroll = sameTask ? box.scrollTop : 0;
  box.innerHTML = fullHtml;
  box.scrollTop = prevScroll;
  lastDetailKey = selectedId;
  lastDetailHtml = fullHtml;

  box.querySelectorAll(".abtn").forEach((b) => b.addEventListener("click", () => doAction(b.dataset.act)));
}

async function doAction(act) {
  if (act === "approve") {
    const approvedBy = savedApprover || promptForApprover();
    if (!approvedBy) return;
    const response = await fetch(`/api/tasks/${encodeURIComponent(selectedId)}/approve`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ approved_by: approvedBy }),
    }).catch(() => null);
    if (!response || !response.ok) alert("驗收失敗:" + (response ? await response.text() : "無法連線"));
  } else if (act === "close") {
    const closedBy = savedApprover || promptForApprover();
    if (!closedBy) return;
    const response = await fetch(`/api/tasks/${encodeURIComponent(selectedId)}/${act}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ closed_by: closedBy }),
    }).catch(() => null);
    if (!response || !response.ok) alert("關閉失敗:" + (response ? await response.text() : "無法連線"));
  } else {
    const response = await fetch(`/api/tasks/${encodeURIComponent(selectedId)}/${act}`, { method: "POST" }).catch(() => null);
    if (!response || !response.ok) alert("操作失敗:" + (response ? await response.text() : "無法連線"));
  }
  refresh();
}

// ── 通知設定彈窗 ──
const nModal = document.getElementById("notifyModal");
async function openNotify() {
  const msg = document.getElementById("nf_msg");
  msg.textContent = "";
  try {
    const { config } = await fetch("/api/notify-config").then((r) => r.json());
    document.getElementById("nf_room").value = config.room_id || "";
    document.getElementById("nf_enabled").checked = !!config.enabled;
    document.getElementById("nf_on").value = config.notify_on || "all";
    nModal.style.display = "flex";
  } catch (_) { msg.textContent = "讀取設定失敗"; }
}
async function saveNotify() {
  const msg = document.getElementById("nf_msg");
  const body = {
    enabled: document.getElementById("nf_enabled").checked,
    room_id: document.getElementById("nf_room").value,
    notify_on: document.getElementById("nf_on").value,
  };
  const r = await fetch("/api/notify-config", { method: "PUT", body: JSON.stringify(body) });
  if (r.ok) { msg.textContent = "已儲存 ✓"; setTimeout(() => (nModal.style.display = "none"), 600); }
  else { msg.textContent = "儲存失敗:" + (await r.text()); }
}
document.getElementById("notifyBtn").addEventListener("click", openNotify);
document.getElementById("notifyClose").addEventListener("click", () => (nModal.style.display = "none"));
document.getElementById("nf_save").addEventListener("click", saveNotify);

// ── 監聽房間彈窗 ──
const rModal = document.getElementById("roomsModal");
let rcRooms = {}; // room_id -> 房名(供即時解析)
// 縮短房名:把名稱裡的 Matrix user id(@localpart:server)砍掉 :server 段。
function shortRoomName(name) { return String(name == null ? "" : name).replace(/(@[^\s:]+):[^\s)]+/g, "$1"); }
function parseRoomLines(text) {
  return String(text || "").split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
}
// 即時把 textarea 內容解析為預覽:已知房間顯示 ✅ 房名、未知顯示 ⚠️ 以 ID 生效。
function renderRoomsPreview() {
  const ids = parseRoomLines(document.getElementById("rc_text").value);
  const box = document.getElementById("rc_preview");
  if (!ids.length) { box.innerHTML = `<span class="muted">（尚未輸入任何 room_id)</span>`; return; }
  const seen = new Set();
  box.innerHTML = ids.map((id) => {
    if (seen.has(id)) return `<div class="muted">↩︎ ${esc(id)}（重複,存檔時自動去除)</div>`;
    seen.add(id);
    const name = rcRooms[id];
    return (name && name !== id)
      ? `<div style="color:#7ee787">✅ ${esc(shortRoomName(name))} <span class="muted">${esc(id)}</span></div>`
      : `<div style="color:#f0b429">⚠️ ${esc(id)} <span class="muted">bot 尚未看過,將以 ID 生效</span></div>`;
  }).join("");
}
async function openRooms() {
  const msg = document.getElementById("rc_msg");
  msg.textContent = "";
  try {
    const d = await fetch("/api/rooms-config").then((r) => r.json());
    rcRooms = d.rooms || {};
    document.getElementById("rc_text").value = (d.room_ids || []).join("\n");
    renderRoomsPreview();
    rModal.style.display = "flex";
  } catch (_) { msg.textContent = "讀取設定失敗"; }
}
async function saveRooms() {
  const msg = document.getElementById("rc_msg");
  const room_ids = parseRoomLines(document.getElementById("rc_text").value);
  const r = await fetch("/api/rooms-config", { method: "PUT", body: JSON.stringify({ room_ids }) });
  if (r.ok) { msg.textContent = "已儲存 ✓ bot 將自動熱載入"; setTimeout(() => (rModal.style.display = "none"), 800); }
  else { msg.textContent = "儲存失敗:" + (await r.text()); }
}
document.getElementById("roomsBtn").addEventListener("click", openRooms);
document.getElementById("roomsClose").addEventListener("click", () => (rModal.style.display = "none"));
document.getElementById("rc_save").addEventListener("click", saveRooms);
document.getElementById("rc_text").addEventListener("input", renderRoomsPreview);
// 點外部區域關閉:先前直接用 click + e.target===rModal 判斷會誤觸——
// 在 textarea 內拖曳選字、放開滑鼠時若滑出到背景,也會被算成「點了背景」而誤關。
// 修法:mousedown 與 click(放開時)都要落在背景本身,才視為真的點外部,拖曳選字不會誤觸。
let rModalMouseDownOnBackdrop = false;
rModal.addEventListener("mousedown", (e) => { rModalMouseDownOnBackdrop = e.target === rModal; });
rModal.addEventListener("click", (e) => {
  if (e.target === rModal && rModalMouseDownOnBackdrop) rModal.style.display = "none";
});
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (rModal.style.display === "flex") rModal.style.display = "none";
  if (nModal.style.display === "flex") nModal.style.display = "none";
});

refresh();
setInterval(refresh, 1500);

// 觸發任務表:欄寬可拖動 + 記憶(mins 依各欄內容給下限,狀態欄容得下「LLM 判斷失敗」5 字)
makeResizable(document.getElementById("tasksTable"), {
  key: "rz.tasks",
  layout: "grid",
  mins: [76, 90, 90, 110, 104],
});
</script>
