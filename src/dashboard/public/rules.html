<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>element-bot 規則設定</title>
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body { font-family: system-ui, "Microsoft JhengHei", sans-serif; background: #16181d; color: #e6e6e6; font-size: 14px; display: flex; flex-direction: column; }
  header { flex-shrink: 0; padding: 10px 16px; background: #1c1f26; border-bottom: 1px solid #2c2f38; display: flex; gap: 16px; align-items: center; }
  header b { font-size: 15px; }
  main { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #2a2d36; vertical-align: top; }
  th { color: #9aa; font-weight: 600; }
  .abtn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; text-decoration: none; }
  .abtn:hover { border-color: #58a6ff; color: #79b8ff; }
  .abtn.primary { background: #1f6feb; color: #fff; border-color: #1f6feb; }
  .abtn.primary:hover { background: #388bfd; color: #fff; }
  .abtn.danger:hover { border-color: #ef4444; color: #ff9d96; }
  .muted { color: #777; }
  .panel { border: 1px solid #2c2f38; border-radius: 8px; padding: 14px; background: #1a1d24; }
  .panel.edit { border-color: #1f6feb55; }
  .row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .row > label { color: #9aa; }
  input[type=text], select { width: 100%; box-sizing: border-box; background: #0f1115; color: #e6e6e6; border: 1px solid #30363d; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  #f_rooms { display: flex; flex-direction: column; gap: 5px; max-height: 180px; overflow: auto; background: #0f1115; border: 1px solid #30363d; border-radius: 6px; padding: 8px; }
  #f_rooms .chk { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  #f_rooms .chk:hover { color: #79b8ff; }
  #f_rooms input[type=checkbox] { width: auto; margin: 0; }
  #f_rooms .rid { color: #667; font-size: 11px; }
  #f_rooms .warn { color: #f0b429; font-size: 11px; }
  .hint { color: #667; font-size: 12px; }
  .tag { display: inline-block; background: #21262d; border: 1px solid #30363d; border-radius: 10px; padding: 1px 8px; margin: 1px 2px; font-size: 12px; }
  .bar { display: flex; gap: 8px; align-items: center; }
  #msg { margin-left: auto; }
  .ok { color: #7ee787; } .err { color: #ff9d96; } .llm { color: #f0b429; }
  .actions { display: flex; gap: 6px; }
  tr.off td { opacity: .45; }
  tr.off td.actions, tr.off td:nth-child(6) { opacity: 1; }
  .sw { cursor: pointer; }
</style>
</head>
<body>
<header>
  <b>⚙ 規則設定</b>
  <a href="/" class="abtn" style="margin-left:auto">← 回監控台</a>
</header>
<main>
  <div class="bar">
    <button class="abtn" id="addBtn">＋ 新增規則</button>
    <button class="abtn primary" id="saveBtn">💾 儲存全部</button>
    <span id="msg" class="muted"></span>
  </div>

  <details class="panel" id="dryPanel">
    <summary style="cursor:pointer;color:#9aa">🧪 規則試跑 — 貼一段訊息,預覽會命中哪些規則(不會真的觸發,也不跑 LLM)</summary>
    <div class="row" style="margin-top:12px"><label>訊息文字</label><input type="text" id="dry_text" placeholder="例如:幫我把背景改成紅色" /></div>
    <div class="row"><label>房間</label><select id="dry_room"></select></div>
    <div class="bar"><button class="abtn primary" id="dryBtn">試跑</button><span class="hint">房間選「全部房間」時,有限定房間的規則會以「房間不符」呈現</span></div>
    <div id="dryResult" style="margin-top:10px"></div>
  </details>

  <div class="panel">
    <table>
      <thead><tr><th>名稱</th><th>關鍵字</th><th>任務</th><th>房間範圍</th><th>LLM</th><th>啟用</th><th>操作</th></tr></thead>
      <tbody id="list"></tbody>
    </table>
  </div>

  <div class="panel edit" id="editPanel" style="display:none">
    <div class="row"><label>名稱</label><input type="text" id="f_name" placeholder="例如:改顏色" /></div>
    <div class="row"><label>關鍵字</label><input type="text" id="f_keywords" placeholder="逗號分隔,例如:改顏色, 背景" /></div>
    <div class="row"><label>任務 (task)</label><select id="f_task"></select></div>
    <div class="row"><label>啟用</label><div><input type="checkbox" id="f_enabled" checked /> <span class="hint">取消勾選 = 停用此規則(保留設定但不觸發)</span></div></div>
    <div class="row"><label>房間範圍</label><div>
      <div id="f_rooms"></div>
      <div class="hint">勾選此規則生效的房間;<b>啟用中的規則必須至少勾一個</b>(都不勾 = 不觸發任何房間)。房名為 bot 已看過的房間才顯示。</div>
    </div></div>
    <div class="row"><label>使用 LLM</label><div><input type="checkbox" id="f_use_llm" /> <span class="hint">勾選後此規則命中關鍵字還會經 LLM 二次判斷並抽參數</span></div></div>
    <div class="row llmonly"><label>觸發意圖 (intent)</label><input type="text" id="f_intent" placeholder="use_llm 開啟時必填:描述什麼情況該觸發" /></div>
    <div class="row llmonly"><label>抽取欄位 (extract)</label><input type="text" id="f_extract" placeholder="逗號分隔,可空" /></div>
    <div class="bar" style="margin-top:6px">
      <button class="abtn primary" id="applyBtn">套用</button>
      <button class="abtn" id="cancelBtn">取消</button>
      <span id="formErr" class="err"></span>
    </div>
  </div>
</main>

<script>
let rules = [];        // 記憶體中的規則陣列(編輯都先改這裡,按「儲存全部」才 PUT)
let rooms = {};        // room_id -> 房名(供標籤顯示)
let monitorRooms = []; // 監聽清單(規則房間 checkbox 的來源)
let tasks = [];        // 可用 task 名稱
let editIndex = -1;    // 正在編輯的規則索引;-1 = 新增

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function splitCsv(s) { return String(s || "").split(",").map((x) => x.trim()).filter(Boolean); }
// 縮短房名:把名稱裡的 Matrix user id(@localpart:server)砍掉 :server 段,
// 例如「Empty room (was @kevin.hce:ims.opscloud.info)」→「Empty room (was @kevin.hce)」。
function shortRoomName(name) { return String(name == null ? "" : name).replace(/(@[^\s:]+):[^\s)]+/g, "$1"); }
function roomLabel(id) { return rooms[id] && rooms[id] !== id ? shortRoomName(rooms[id]) : id; }
function isEnabled(r) { return r.enabled !== false; } // 缺省/true=啟用;只有明確 false 才停用
function setMsg(text, cls) { const m = document.getElementById("msg"); m.textContent = text; m.className = cls || "muted"; }

async function load() {
  const d = await fetch("/api/rules").then((r) => r.json());
  rules = Array.isArray(d.rules) ? d.rules : [];
  rooms = d.rooms || {};
  monitorRooms = Array.isArray(d.monitor_rooms) ? d.monitor_rooms : [];
  tasks = Array.isArray(d.tasks) ? d.tasks : [];
  fillDryRoom();
  renderList();
}

// 試跑用房間下拉:第一項「全部房間」(不帶 room_id),其餘為已知房間。
function fillDryRoom() {
  const sel = document.getElementById("dry_room");
  const opts = [`<option value="">全部房間(不指定)</option>`];
  for (const id of Object.keys(rooms)) {
    const label = rooms[id] && rooms[id] !== id ? `${shortRoomName(rooms[id])}（${id}）` : id;
    opts.push(`<option value="${esc(id)}">${esc(label)}</option>`);
  }
  sel.innerHTML = opts.join("");
}

// 試跑:把訊息文字(+可選房間)送後端,逐條規則顯示會不會命中/觸發。
async function dryRun() {
  const body = document.getElementById("dry_text").value;
  const room_id = document.getElementById("dry_room").value;
  const out = document.getElementById("dryResult");
  if (!body.trim()) { out.innerHTML = `<span class="muted">請先輸入訊息文字。</span>`; return; }
  out.innerHTML = `<span class="muted">試跑中…</span>`;
  try {
    const res = await fetch("/api/rules/dry-run", { method: "POST", body: JSON.stringify({ body, room_id: room_id || undefined }) });
    if (!res.ok) { out.innerHTML = `<span class="err">試跑失敗:${esc(await res.text())}</span>`; return; }
    const { results } = await res.json();
    renderDryResult(results || []);
  } catch (e) {
    out.innerHTML = `<span class="err">試跑失敗:${esc(e.message)}</span>`;
  }
}

function renderDryResult(results) {
  const out = document.getElementById("dryResult");
  if (!results.length) { out.innerHTML = `<span class="muted">（尚無規則)</span>`; return; }
  const rows = results.map((r) => {
    let verdict, cls;
    if (r.triggers) { verdict = "✅ 會觸發"; cls = "ok"; }
    else if (r.needs_llm) { verdict = "🤖 關鍵字命中 → 會送 LLM 二次判斷(此處不實跑)"; cls = "llm"; }
    else {
      const reasons = [];
      if (!r.keyword_hit) reasons.push("關鍵字未命中");
      if (!r.enabled) reasons.push("規則已停用");
      if (!r.room_ok) reasons.push("房間不符");
      verdict = `⬜ 不觸發（${reasons.join("、") || "—"}）`; cls = "muted";
    }
    return `<tr><td>${esc(r.name)}</td><td class="muted">${esc(r.task)}</td><td class="${cls}">${verdict}</td></tr>`;
  }).join("");
  out.innerHTML = `<table><thead><tr><th>規則</th><th>任務</th><th>試跑結果</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderList() {
  const tb = document.getElementById("list");
  if (!rules.length) { tb.innerHTML = `<tr><td colspan="7" class="muted">（尚無規則,按「新增規則」開始）</td></tr>`; return; }
  tb.innerHTML = rules.map((r, i) => {
    const kw = (r.keywords || []).map((k) => `<span class="tag">${esc(k)}</span>`).join("");
    const rm = (Array.isArray(r.rooms) && r.rooms.length)
      ? r.rooms.map((id) => `<span class="tag" title="${esc(id)}">${esc(roomLabel(id))}</span>`).join("")
      : `<span class="err">未指定房間 → 不觸發</span>`;
    const on = isEnabled(r);
    return `<tr class="${on ? "" : "off"}">
      <td>${esc(r.name)}</td>
      <td>${kw}</td>
      <td>${esc(r.task)}</td>
      <td>${rm}</td>
      <td>${r.use_llm ? "✓" : "—"}</td>
      <td><label class="sw" title="${on ? "已啟用,點擊停用" : "已停用,點擊啟用"}"><input type="checkbox" data-toggle="${i}" ${on ? "checked" : ""}/></label></td>
      <td class="actions">
        <button class="abtn" data-edit="${i}">編輯</button>
        <button class="abtn danger" data-del="${i}">刪除</button>
      </td></tr>`;
  }).join("");
  tb.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => openEdit(+b.dataset.edit)));
  tb.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => delRule(+b.dataset.del)));
  tb.querySelectorAll("[data-toggle]").forEach((c) => c.addEventListener("change", () => toggleEnabled(+c.dataset.toggle, c.checked)));
}

function fillSelects(rule) {
  const ts = document.getElementById("f_task");
  ts.innerHTML = tasks.map((t) => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
  if (rule && rule.task) ts.value = rule.task;

  // 房間(checkbox):來源為「監聽清單」(monitor_rooms,即 rooms-config.json)。
  // 規則只能從監聽清單挑子集。若規則裡有清單外的 id(日後被移出監聽),仍列出並標
  // ⚠️「已不在監聽清單」(不靜默丟掉,以免使用者不知道規則哪裡壞);勾選 = 納入此規則。
  const known = new Set(monitorRooms);
  const ruleRooms = rule && Array.isArray(rule.rooms) ? rule.rooms : [];
  const ids = [...monitorRooms, ...ruleRooms.filter((id) => !known.has(id))];
  const sel = new Set(ruleRooms);
  const rs = document.getElementById("f_rooms");
  rs.innerHTML = ids.map((id) => {
    const name = rooms[id];
    const nameLabel = (name && name !== id)
      ? `${esc(shortRoomName(name))} <span class="rid">${esc(id)}</span>`
      : `${esc(id)}`;
    const label = known.has(id)
      ? nameLabel
      : `${nameLabel} <span class="warn">⚠️ 已不在監聽清單</span>`;
    return `<label class="chk"><input type="checkbox" value="${esc(id)}" ${sel.has(id) ? "checked" : ""}/> ${label}</label>`;
  }).join("") || `<span class="muted">（監聽清單為空;請先到主控台「🏠 監聽房間」新增房間)</span>`;
}

function toggleLlm() {
  const on = document.getElementById("f_use_llm").checked;
  document.querySelectorAll(".llmonly").forEach((e) => e.style.display = on ? "" : "none");
}

function openEdit(index) {
  editIndex = index;
  const r = index >= 0 ? rules[index] : { name: "", keywords: [], task: tasks[0] || "", use_llm: false };
  document.getElementById("f_name").value = r.name || "";
  document.getElementById("f_keywords").value = (r.keywords || []).join(", ");
  document.getElementById("f_enabled").checked = index < 0 ? true : isEnabled(r);
  document.getElementById("f_use_llm").checked = !!r.use_llm;
  document.getElementById("f_intent").value = r.intent || "";
  document.getElementById("f_extract").value = (r.extract || []).join(", ");
  fillSelects(r);
  toggleLlm();
  document.getElementById("formErr").textContent = "";
  document.getElementById("editPanel").style.display = "";
}

function closeEdit() { document.getElementById("editPanel").style.display = "none"; editIndex = -1; }

async function applyEdit() {
  const name = document.getElementById("f_name").value.trim();
  const keywords = splitCsv(document.getElementById("f_keywords").value);
  const task = document.getElementById("f_task").value;
  const use_llm = document.getElementById("f_use_llm").checked;
  const enabled = document.getElementById("f_enabled").checked;
  const roomsSel = [...document.querySelectorAll("#f_rooms input:checked")].map((c) => c.value);
  const intent = document.getElementById("f_intent").value.trim();
  const extract = splitCsv(document.getElementById("f_extract").value);

  const err = (m) => { document.getElementById("formErr").textContent = m; };
  if (!name) return err("名稱必填");
  if (!keywords.length) return err("關鍵字至少一個");
  if (!task) return err("請選擇任務");
  if (use_llm && !intent) return err("使用 LLM 時,觸發意圖(intent)必填");
  if (enabled && !roomsSel.length) return err("啟用中的規則必須至少勾選一個房間;或取消勾選「啟用」");

  const rule = { name, keywords, task, use_llm };
  if (!enabled) rule.enabled = false;               // 啟用為預設,只在停用時寫欄位
  if (roomsSel.length) rule.rooms = roomsSel;       // 留空 = 不觸發(僅停用規則允許)
  if (use_llm) { rule.intent = intent; if (extract.length) rule.extract = extract; }
  else if (extract.length) rule.extract = extract;

  const next = [...rules];
  if (editIndex >= 0) next[editIndex] = rule; else next.push(rule);
  if (!(await pushRules(next))) return; // 存檔失敗:保留編輯面板,讓使用者修正後重試
  closeEdit();
}

async function delRule(index) {
  if (!confirm(`確定刪除規則「${rules[index] && rules[index].name}」?`)) return;
  const next = rules.filter((_, i) => i !== index);
  if (editIndex === index) closeEdit();
  await pushRules(next);
}

// 清單上的啟用/停用 toggle:即點即存。啟用時移除 enabled 欄位(回到預設),停用時寫 enabled:false。
async function toggleEnabled(index, on) {
  const next = rules.map((r, i) => {
    if (i !== index) return r;
    const c = { ...r };
    if (on) delete c.enabled; else c.enabled = false;
    return c;
  });
  if (!(await pushRules(next))) renderList(); // 存檔失敗:重繪把 checkbox 還原成實際狀態
}

// 立即把 next 這份完整規則陣列存到伺服器;成功才更新畫面上的 rules。回傳是否成功。
async function pushRules(next) {
  setMsg("儲存中…", "muted");
  try {
    const res = await fetch("/api/rules", { method: "PUT", body: JSON.stringify(next) });
    if (res.ok) { rules = next; renderList(); setMsg("✅ 已儲存,bot 會自動熱載入新規則。", "ok"); return true; }
    const t = await res.text();
    setMsg("❌ 儲存失敗:" + t, "err");
    return false;
  } catch (e) {
    setMsg("❌ 儲存失敗:" + e.message, "err");
    return false;
  }
}

async function saveAll() { await pushRules(rules); }

document.getElementById("addBtn").addEventListener("click", () => openEdit(-1));
document.getElementById("saveBtn").addEventListener("click", saveAll);
document.getElementById("applyBtn").addEventListener("click", applyEdit);
document.getElementById("cancelBtn").addEventListener("click", closeEdit);
document.getElementById("f_use_llm").addEventListener("change", toggleLlm);
document.getElementById("dryBtn").addEventListener("click", dryRun);
document.getElementById("dry_text").addEventListener("keydown", (e) => { if (e.key === "Enter") dryRun(); });

load().catch((e) => setMsg("載入失敗:" + e.message, "err"));
</script>
</body>
</html>
