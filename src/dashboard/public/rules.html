<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>element-bot 規則設定</title>
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body { font-family: system-ui, "Microsoft JhengHei", sans-serif; background: #16181d; color: #e6e6e6; font-size: 14px; display: flex; flex-direction: column; }
  header { flex-shrink: 0; padding: 10px 16px; background: #1c1f26; border-bottom: 1px solid #2c2f38; display: flex; gap: 16px; align-items: center; }
  header b { font-size: 15px; }
  main { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #2a2d36; vertical-align: top; }
  th { color: #9aa; font-weight: 600; }
  .abtn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; text-decoration: none; }
  .abtn:hover { border-color: #58a6ff; color: #79b8ff; }
  .abtn.primary { background: #1f6feb; color: #fff; border-color: #1f6feb; }
  .abtn.primary:hover { background: #388bfd; color: #fff; }
  .abtn.danger:hover { border-color: #ef4444; color: #ff9d96; }
  .muted { color: #777; }
  .panel { border: 1px solid #2c2f38; border-radius: 8px; padding: 14px; background: #1a1d24; }
  .panel.edit { border-color: #1f6feb55; }
  .row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
  .row > label { color: #9aa; }
  input[type=text], select { width: 100%; box-sizing: border-box; background: #0f1115; color: #e6e6e6; border: 1px solid #30363d; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  select[multiple] { min-height: 80px; }
  .hint { color: #667; font-size: 12px; }
  .tag { display: inline-block; background: #21262d; border: 1px solid #30363d; border-radius: 10px; padding: 1px 8px; margin: 1px 2px; font-size: 12px; }
  .bar { display: flex; gap: 8px; align-items: center; }
  #msg { margin-left: auto; }
  .ok { color: #7ee787; } .err { color: #ff9d96; }
  .actions { display: flex; gap: 6px; }
</style>
</head>
<body>
<header>
  <b>⚙ 規則設定</b>
  <a href="/" class="abtn" style="margin-left:auto">← 回監控台</a>
</header>
<main>
  <div class="bar">
    <button class="abtn" id="addBtn">＋ 新增規則</button>
    <button class="abtn primary" id="saveBtn">💾 儲存全部</button>
    <span id="msg" class="muted"></span>
  </div>

  <div class="panel">
    <table>
      <thead><tr><th>名稱</th><th>關鍵字</th><th>任務</th><th>房間範圍</th><th>LLM</th><th>操作</th></tr></thead>
      <tbody id="list"></tbody>
    </table>
  </div>

  <div class="panel edit" id="editPanel" style="display:none">
    <div class="row"><label>名稱</label><input type="text" id="f_name" placeholder="例如:改顏色" /></div>
    <div class="row"><label>關鍵字</label><input type="text" id="f_keywords" placeholder="逗號分隔,例如:改顏色, 背景" /></div>
    <div class="row"><label>任務 (task)</label><select id="f_task"></select></div>
    <div class="row"><label>房間範圍</label><div><select id="f_rooms" multiple></select><div class="hint">不選 = 套用全部監聽房間;可複選(Ctrl/⌘ 點選)</div></div></div>
    <div class="row"><label>使用 LLM</label><div><input type="checkbox" id="f_use_llm" /> <span class="hint">勾選後此規則命中關鍵字還會經 LLM 二次判斷並抽參數</span></div></div>
    <div class="row llmonly"><label>觸發意圖 (intent)</label><input type="text" id="f_intent" placeholder="use_llm 開啟時必填:描述什麼情況該觸發" /></div>
    <div class="row llmonly"><label>抽取欄位 (extract)</label><input type="text" id="f_extract" placeholder="逗號分隔,可空" /></div>
    <div class="bar" style="margin-top:6px">
      <button class="abtn primary" id="applyBtn">套用</button>
      <button class="abtn" id="cancelBtn">取消</button>
      <span id="formErr" class="err"></span>
    </div>
  </div>
</main>

<script>
let rules = [];        // 記憶體中的規則陣列(編輯都先改這裡,按「儲存全部」才 PUT)
let rooms = {};        // room_id -> 房名
let tasks = [];        // 可用 task 名稱
let editIndex = -1;    // 正在編輯的規則索引;-1 = 新增

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function splitCsv(s) { return String(s || "").split(",").map((x) => x.trim()).filter(Boolean); }
function roomLabel(id) { return rooms[id] && rooms[id] !== id ? `${rooms[id]}` : id; }
function setMsg(text, cls) { const m = document.getElementById("msg"); m.textContent = text; m.className = cls || "muted"; }

async function load() {
  const d = await fetch("/api/rules").then((r) => r.json());
  rules = Array.isArray(d.rules) ? d.rules : [];
  rooms = d.rooms || {};
  tasks = Array.isArray(d.tasks) ? d.tasks : [];
  renderList();
}

function renderList() {
  const tb = document.getElementById("list");
  if (!rules.length) { tb.innerHTML = `<tr><td colspan="6" class="muted">（尚無規則,按「新增規則」開始）</td></tr>`; return; }
  tb.innerHTML = rules.map((r, i) => {
    const kw = (r.keywords || []).map((k) => `<span class="tag">${esc(k)}</span>`).join("");
    const rm = (Array.isArray(r.rooms) && r.rooms.length)
      ? r.rooms.map((id) => `<span class="tag" title="${esc(id)}">${esc(roomLabel(id))}</span>`).join("")
      : `<span class="muted">全部房間</span>`;
    return `<tr>
      <td>${esc(r.name)}</td>
      <td>${kw}</td>
      <td>${esc(r.task)}</td>
      <td>${rm}</td>
      <td>${r.use_llm ? "✓" : "—"}</td>
      <td class="actions">
        <button class="abtn" data-edit="${i}">編輯</button>
        <button class="abtn danger" data-del="${i}">刪除</button>
      </td></tr>`;
  }).join("");
  tb.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => openEdit(+b.dataset.edit)));
  tb.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => delRule(+b.dataset.del)));
}

function fillSelects(rule) {
  const ts = document.getElementById("f_task");
  ts.innerHTML = tasks.map((t) => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
  if (rule && rule.task) ts.value = rule.task;

  // 房間選項:已知房間 + 規則裡可能有但 rooms.json 還沒學到的 id,都列出來不遺漏。
  const ids = new Set(Object.keys(rooms));
  if (rule && Array.isArray(rule.rooms)) rule.rooms.forEach((id) => ids.add(id));
  const sel = new Set(rule && Array.isArray(rule.rooms) ? rule.rooms : []);
  const rs = document.getElementById("f_rooms");
  rs.innerHTML = [...ids].map((id) => {
    const label = rooms[id] && rooms[id] !== id ? `${rooms[id]}(${id}）` : id;
    return `<option value="${esc(id)}" ${sel.has(id) ? "selected" : ""}>${esc(label)}</option>`;
  }).join("") || `<option disabled>（尚無已知房間;bot 在房間收過訊息後才會出現）</option>`;
}

function toggleLlm() {
  const on = document.getElementById("f_use_llm").checked;
  document.querySelectorAll(".llmonly").forEach((e) => e.style.display = on ? "" : "none");
}

function openEdit(index) {
  editIndex = index;
  const r = index >= 0 ? rules[index] : { name: "", keywords: [], task: tasks[0] || "", use_llm: false };
  document.getElementById("f_name").value = r.name || "";
  document.getElementById("f_keywords").value = (r.keywords || []).join(", ");
  document.getElementById("f_use_llm").checked = !!r.use_llm;
  document.getElementById("f_intent").value = r.intent || "";
  document.getElementById("f_extract").value = (r.extract || []).join(", ");
  fillSelects(r);
  toggleLlm();
  document.getElementById("formErr").textContent = "";
  document.getElementById("editPanel").style.display = "";
}

function closeEdit() { document.getElementById("editPanel").style.display = "none"; editIndex = -1; }

function applyEdit() {
  const name = document.getElementById("f_name").value.trim();
  const keywords = splitCsv(document.getElementById("f_keywords").value);
  const task = document.getElementById("f_task").value;
  const use_llm = document.getElementById("f_use_llm").checked;
  const roomsSel = [...document.getElementById("f_rooms").selectedOptions].map((o) => o.value);
  const intent = document.getElementById("f_intent").value.trim();
  const extract = splitCsv(document.getElementById("f_extract").value);

  const err = (m) => { document.getElementById("formErr").textContent = m; };
  if (!name) return err("名稱必填");
  if (!keywords.length) return err("關鍵字至少一個");
  if (!task) return err("請選擇任務");
  if (use_llm && !intent) return err("使用 LLM 時,觸發意圖(intent)必填");

  const rule = { name, keywords, task, use_llm };
  if (roomsSel.length) rule.rooms = roomsSel;       // 不選 = 全部房間(省略欄位)
  if (use_llm) { rule.intent = intent; if (extract.length) rule.extract = extract; }
  else if (extract.length) rule.extract = extract;

  if (editIndex >= 0) rules[editIndex] = rule; else rules.push(rule);
  closeEdit();
  renderList();
  setMsg("已套用到暫存,記得按「儲存全部」寫入。", "muted");
}

function delRule(index) {
  if (!confirm(`確定刪除規則「${rules[index] && rules[index].name}」?(按「儲存全部」後才真正寫入)`)) return;
  rules.splice(index, 1);
  if (editIndex === index) closeEdit();
  renderList();
  setMsg("已從暫存刪除,記得按「儲存全部」。", "muted");
}

async function saveAll() {
  setMsg("儲存中…", "muted");
  try {
    const res = await fetch("/api/rules", { method: "PUT", body: JSON.stringify(rules) });
    if (res.ok) { setMsg("✅ 已儲存,bot 會自動熱載入新規則。", "ok"); await load(); }
    else { const t = await res.text(); setMsg("❌ 儲存失敗:" + t, "err"); }
  } catch (e) { setMsg("❌ 儲存失敗:" + e.message, "err"); }
}

document.getElementById("addBtn").addEventListener("click", () => openEdit(-1));
document.getElementById("saveBtn").addEventListener("click", saveAll);
document.getElementById("applyBtn").addEventListener("click", applyEdit);
document.getElementById("cancelBtn").addEventListener("click", closeEdit);
document.getElementById("f_use_llm").addEventListener("change", toggleLlm);

load().catch((e) => setMsg("載入失敗:" + e.message, "err"));
</script>
</body>
</html>
